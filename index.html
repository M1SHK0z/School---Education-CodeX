<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocab Master - Duolingo Style</title>
<style>
:root {
    --primary: #58cc02;
    --primary-dark: #46a302;
    --secondary: #3a3a3a;
    --bg-dark: #1e1e1e;
    --text-light: #e0e0e0;
    --error: #ff4b4b;
    --success: #d7ffb8;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--bg-dark);
    color: var(--text-light);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 20px;
}

.container {
    width: 500px;
    max-width: 100%;
    background: #2a2a2a;
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transition: all 0.3s ease;
}

h1,h2 { text-align: center; margin-bottom: 20px; }
button { font-family: inherit; }

.page { display: none; }
.page.active { display: block; }

.lesson-btn {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: #3a3a3a;
    color: var(--text-light);
    transition: transform 0.2s, background 0.2s;
}
.lesson-btn:hover { transform: scale(1.05); background: #505050; }

.progress-bar {
    width: 100%;
    height: 16px;
    background: #505050;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
}
#progress { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s ease; }

.word-to-translate { font-size: 32px; font-weight: bold; margin: 20px 0; color: #1cb0f6; }

.options { display: grid; gap: 12px; margin-bottom: 20px; }
.option-btn {
    padding: 15px;
    font-size: 18px;
    border: 2px solid #505050;
    border-radius: 12px;
    background: #3a3a3a;
    color: var(--text-light);
    cursor: pointer;
    transition: all 0.2s;
}
.option-btn:hover { background: #505050; }
.option-btn.correct { background: var(--success); border-color: var(--primary); color: var(--primary-dark); }
.option-btn.wrong { background: var(--error); border-color: var(--error); color: #fff; }

#next-btn {
    padding: 12px 40px;
    background-color: var(--primary);
    color: white;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    font-size: 18px;
    cursor: pointer;
    display: none;
    transition: transform 0.2s;
}
#next-btn:hover { transform: scale(1.05); }

.feedback { font-weight: bold; height: 24px; text-align: center; margin-bottom: 10px; }

body[data-cursor] { cursor: none; }
#custom-cursor {
    position: fixed;
    width: 20px; height: 20px;
    border: 2px solid var(--primary);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease;
}
</style>
</head>
<body data-cursor="true">

<div id="custom-cursor"></div>

<div class="container">
    <!-- Home Page -->
    <div class="page active" id="home-page">
        <h1>Vocab Master</h1>
        <h2>Kies een les</h2>
        <div id="lessons-container"></div>
    </div>

    <!-- Lesson Page -->
    <div class="page" id="lesson-page">
        <div class="progress-bar"><div id="progress"></div></div>
        <div class="question-box">
            <p>Vertaal dit woord:</p>
            <div class="word-to-translate" id="target-word">Laden...</div>
        </div>
        <div class="options" id="options-container"></div>
        <div class="feedback" id="feedback"></div>
        <button id="know-btn">Weet ik al</button>
        <button id="next-btn" onclick="nextQuestion()">VOLGENDE</button>
        <button id="back-home" style="margin-top:15px; background:#505050;">Terug naar home</button>
    </div>
</div>

<script>
// Dynamische cursor
const cursor = document.getElementById('custom-cursor');
document.addEventListener('mousemove', e => {
    cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
});

// Lessons setup
const lessons = {
    'Les 1': [
        {en: "affection", nl: "genegenheid"}, {en: "spouse", nl: "echtgenoot"},
        {en: "bachelor", nl: "vrijgezel"}, {en: "tenant", nl: "huurder"}
    ],
    'Les 2': [
        {en: "cherish", nl: "koesteren"}, {en: "upbringing", nl: "opvoeding"},
        {en: "commitment", nl: "toewijding"}, {en: "acquaintance", nl: "kennis"}
    ],
    'Les 3': [
        {en: "compassionate", nl: "meelevend"}, {en: "perception", nl: "waarneming"},
        {en: "correspondence", nl: "correspondentie"}, {en: "altruism", nl: "altruïsme"}
    ]
};

let currentLesson = [];
let currentWord = {};
let score = 0;
let totalToWin = 10;
let knownWords = new Set();

// Populate lessons
const lessonsContainer = document.getElementById('lessons-container');
for(const lesson in lessons){
    const btn = document.createElement('button');
    btn.className = 'lesson-btn';
    btn.innerText = lesson;
    btn.onclick = () => startLesson(lesson);
    lessonsContainer.appendChild(btn);
}

// Page switching
function showPage(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function startLesson(lessonName){
    currentLesson = [...lessons[lessonName]];
    currentLesson = currentLesson.filter(w => !knownWords.has(w.en));
    score = 0;
    totalToWin = currentLesson.length;
    showPage('lesson-page');
    nextQuestion();
}

// Generate question
function nextQuestion(){
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('feedback').innerText = '';
    document.getElementById('know-btn').style.display = 'inline-block';

    if(currentLesson.length === 0){
        document.getElementById('target-word').innerText = "Gefeliciteerd! Alle woorden geleerd.";
        document.getElementById('options-container').innerHTML = '';
        document.getElementById('progress').style.width = '100%';
        document.getElementById('next-btn').style.display = 'none';
        return;
    }

    // Kies willekeurig woord
    currentWord = currentLesson[Math.floor(Math.random()*currentLesson.length)];
    document.getElementById('target-word').innerText = currentWord.en;

    // Opties
    let options = [currentWord.nl];
    while(options.length < 3){
        let randomWord = currentLesson[Math.floor(Math.random()*currentLesson.length)].nl;
        if(!options.includes(randomWord)) options.push(randomWord);
    }
    options.sort(()=>Math.random()-0.5);

    const container = document.getElementById('options-container');
    container.innerHTML = '';
    options.forEach(opt=>{
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = ()=>checkAnswer(btn,opt);
        container.appendChild(btn);
    });
}

// Check answer
function checkAnswer(btn, choice){
    const allBtns = document.querySelectorAll('.option-btn');
    allBtns.forEach(b=>b.disabled = true);
    document.getElementById('know-btn').style.display = 'none';

    if(choice === currentWord.nl){
        btn.classList.add('correct');
        document.getElementById('feedback').innerText = "Heel goed!";
        score++;
        knownWords.add(currentWord.en);
        updateProgress();
        currentLesson = currentLesson.filter(w=>w.en !== currentWord.en);
    } else {
        btn.classList.add('wrong');
        document.getElementById('feedback').innerText = `Helaas! Het was: ${currentWord.nl}`;
    }
    document.getElementById('next-btn').style.display = 'inline-block';
}

// Weet ik al
document.getElementById('know-btn').onclick = ()=>{
    knownWords.add(currentWord.en);
    currentLesson = currentLesson.filter(w=>w.en !== currentWord.en);
    nextQuestion();
}

// Progress bar
function updateProgress(){
    const percent = ((score)/totalToWin)*100;
    document.getElementById('progress').style.width = Math.min(percent,100)+'%';
}

// Back to home
document.getElementById('back-home').onclick = ()=>{
    showPage('home-page');
}
</script>

</body>
</html>
